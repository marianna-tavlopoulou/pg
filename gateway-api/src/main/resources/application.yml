spring:
  application:
    name: payment-gateway
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_gateway
    username: gateway
    password: gateway_pass
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
  threads:
    virtual:
      enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
    consumer:
      group-id: payment-gateway-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: 8080
  error:
    include-message: always

jwt:
  secret: ${JWT_SECRET:this-is-a-super-secure-and-ultra-long-secret-key-for-marianna-payment-gateway-2026=}
  expiration-ms: 3600000

auth:
  api-key: ${AUTH_API_KEY:local-dev-only}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs.path: /api-docs

logging:
  level:
    com.marianna.gateway: DEBUG
